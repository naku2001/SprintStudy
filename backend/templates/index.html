<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SprintStudy - Study Note Summary</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #12223a;
      --muted: #5a6b84;
      --accent: #0a84ff;
      --border: #d6e0ef;
      --error: #c52020;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #edf3fc 0%, var(--bg) 100%);
    }
    .wrap {
      max-width: 920px;
      margin: 40px auto;
      padding: 0 16px;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(16, 40, 78, 0.08);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
    }
    p {
      margin: 0 0 16px;
      color: var(--muted);
    }
    .row {
      display: flex;
      gap: 12px;
      align-items: center;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    input[type="file"] {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 8px;
      background: #fff;
      min-width: 300px;
    }
    button {
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: white;
      padding: 10px 16px;
      font-weight: 600;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .meta {
      margin: 10px 0;
      font-size: 14px;
      color: var(--muted);
    }
    .error {
      color: var(--error);
      font-weight: 600;
      margin: 10px 0;
    }
    pre {
      margin: 12px 0 0;
      background: #f9fbff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      white-space: pre-wrap;
      line-height: 1.5;
      max-height: 520px;
      overflow: auto;
    }
    .markdown-box {
      margin: 12px 0 0;
      background: #f9fbff;
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px;
      max-height: 520px;
      overflow: auto;
      line-height: 1.55;
    }
    .markdown-box h1, .markdown-box h2, .markdown-box h3 {
      margin-top: 14px;
      margin-bottom: 8px;
    }
    .markdown-box ul, .markdown-box ol {
      margin-top: 6px;
      margin-bottom: 10px;
      padding-left: 20px;
    }
    .markdown-box p {
      color: var(--text);
      margin-bottom: 10px;
    }
    .list-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-top: 20px;
      margin-bottom: 8px;
    }
    .notes {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fcfdff;
      padding: 10px;
    }
    .note-item {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 10px;
      margin-bottom: 8px;
      background: #fff;
    }
    .note-item:last-child { margin-bottom: 0; }
    .note-top {
      display: flex;
      justify-content: space-between;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 8px;
    }
    .note-meta {
      font-size: 13px;
      color: var(--muted);
    }
    .actions {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .btn-secondary {
      background: #174b86;
    }
    .btn-danger {
      background: #c52020;
    }
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <h1>Study Note Summary</h1>
      <p>Upload one <code>.pdf</code> or <code>.txt</code> file to generate a summary with Gemini.</p>
      <div class="row">
        <input id="fileInput" type="file" accept=".pdf,.txt">
        <button id="submitBtn" type="button">Summarize</button>
      </div>
      <div id="status" class="meta"></div>
      <div id="error" class="error"></div>
      <pre id="summaryBox" style="display:none;">Summary will appear here...</pre>
      <div id="summaryMarkdown" class="markdown-box">Summary will appear here...</div>

      <div class="list-head">
        <h2 style="margin:0;font-size:20px;">Stored Notes</h2>
        <button id="refreshBtn" class="btn-secondary" type="button">Refresh List</button>
      </div>
      <div id="notesList" class="notes">Loading...</div>
    </section>
  </main>

  <script>
    const fileInput = document.getElementById("fileInput");
    const submitBtn = document.getElementById("submitBtn");
    const statusEl = document.getElementById("status");
    const errorEl = document.getElementById("error");
    const summaryBox = document.getElementById("summaryBox");
    const summaryMarkdown = document.getElementById("summaryMarkdown");
    const refreshBtn = document.getElementById("refreshBtn");
    const notesList = document.getElementById("notesList");
    let summaryTextBuffer = "";

    function escapeHtml(text) {
      return String(text)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function renderBasicMarkdown(mdText) {
      const escaped = escapeHtml(mdText);
      let html = escaped;
      html = html.replace(/\*\*/g, "");
      html = html.replace(/^### (.*)$/gm, "<h3>$1</h3>");
      html = html.replace(/^## (.*)$/gm, "<h2>$1</h2>");
      html = html.replace(/^# (.*)$/gm, "<h1>$1</h1>");
      html = html.replace(/^\d+\. (.*)$/gm, "<li>$1</li>");
      html = html.replace(/^- (.*)$/gm, "<li>$1</li>");
      html = html.replace(/(<li>.*<\/li>)/gs, (block) => {
        const items = block.match(/<li>.*?<\/li>/g) || [];
        return "<ul>" + items.join("") + "</ul>";
      });
      html = html.replace(/\n{2,}/g, "</p><p>");
      html = "<p>" + html + "</p>";
      html = html.replace(/<p>\s*(<h[1-3]>)/g, "$1");
      html = html.replace(/(<\/h[1-3]>)\s*<\/p>/g, "$1");
      html = html.replace(/<p>\s*(<ul>)/g, "$1");
      html = html.replace(/(<\/ul>)\s*<\/p>/g, "$1");
      return html;
    }

    function setSummaryText(text) {
      summaryTextBuffer = normalizeMarkdownText(text);
      summaryBox.textContent = summaryTextBuffer;
      summaryMarkdown.innerHTML = renderBasicMarkdown(summaryTextBuffer);
    }

    function normalizeMarkdownText(text) {
      const raw = String(text || "").replace(/\r\n/g, "\n").replace(/\*\*/g, "");
      const lines = raw.split("\n");
      const headingMap = {
        "one-sentence overview": "# One-Sentence Overview",
        "key takeaways": "## Key Takeaways",
        "topic flow": "## Topic Flow",
        "important details": "## Important Details",
        "risks or limitations": "## Risks or Limitations",
        "3 quick review questions": "## 3 Quick Review Questions"
      };

      const mappedLines = lines.map((line) => {
        const stripped = line.trim().replace(/:$/, "").toLowerCase();
        if (headingMap[stripped]) return headingMap[stripped];
        return line;
      });

      const nonEmptyIdx = [];
      mappedLines.forEach((line, i) => {
        if (line.trim()) nonEmptyIdx.push(i);
      });
      if (nonEmptyIdx.length >= 2) {
        const first = mappedLines[nonEmptyIdx[0]].trim().replace(/^#+\s*/, "").replace(/:$/, "").toLowerCase();
        const second = mappedLines[nonEmptyIdx[1]].trim().replace(/^#+\s*/, "").replace(/:$/, "").toLowerCase();
        if (first === second) {
          mappedLines[nonEmptyIdx[1]] = "";
        }
      }

      const normalized = mappedLines.join("\n").replace(/\n{3,}/g, "\n\n").trim();

      const firstNonEmpty = (normalized.split("\n").find((line) => line.trim()) || "")
        .trim()
        .replace(/:$/, "")
        .toLowerCase()
        .replace(/^#+\s*/, "");

      if (!normalized.startsWith("# ") && firstNonEmpty !== "one-sentence overview") {
        return "# One-Sentence Overview\n" + normalized;
      }
      return normalized;
    }

    async function consumeSseResponse(response, onEvent) {
      const reader = response.body.getReader();
      const decoder = new TextDecoder("utf-8");
      let buffer = "";
      while (true) {
        const { value, done } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });

        let idx;
        while ((idx = buffer.indexOf("\n\n")) !== -1) {
          const rawEvent = buffer.slice(0, idx).trim();
          buffer = buffer.slice(idx + 2);
          if (!rawEvent) continue;

          const lines = rawEvent.split("\n");
          let evt = "message";
          let data = "";
          for (const line of lines) {
            if (line.startsWith("event:")) evt = line.slice(6).trim();
            if (line.startsWith("data:")) data += line.slice(5).trim();
          }
          if (!data) continue;
          let payload;
          try {
            payload = JSON.parse(data);
          } catch {
            payload = { text: data };
          }
          onEvent(evt, payload);
        }
      }
    }

    async function refreshNotes() {
      notesList.textContent = "Loading...";
      try {
        const response = await fetch("/api/study-notes");
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.detail || "Failed to load notes.");

        const notes = payload.notes || [];
        if (!notes.length) {
          notesList.textContent = "No stored notes yet.";
          return;
        }

        notesList.innerHTML = notes.map((n) => `
          <div class="note-item">
            <div class="note-top">
              <div>
                <div><strong>${escapeHtml(n.filename || "unknown")}</strong></div>
                <div class="note-meta">
                  note_id: ${escapeHtml(n.note_id)} | chunks: ${n.chunk_count} |
                  local: ${n.local_file_exists ? "yes" : "no"}
                </div>
              </div>
              <div class="actions">
                <button class="btn-secondary" type="button" onclick="resummarizeNote('${encodeURIComponent(n.note_id)}')">Re-summarize</button>
                <button class="btn-secondary" type="button" onclick="viewNote('${encodeURIComponent(n.note_id)}')">View</button>
                <button class="btn-danger" type="button" onclick="deleteNote('${encodeURIComponent(n.note_id)}')">Delete</button>
              </div>
            </div>
          </div>
        `).join("");
      } catch (err) {
        notesList.textContent = "Error: " + (err.message || String(err));
      }
    }

    window.viewNote = async (encodedId) => {
      const noteId = decodeURIComponent(encodedId);
      errorEl.textContent = "";
      statusEl.textContent = "Loading note detail...";
      try {
        const response = await fetch(`/api/study-notes/${encodeURIComponent(noteId)}`);
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.detail || "Failed to load note detail.");

        const lines = [];
        lines.push(`note_id: ${payload.note_id}`);
        lines.push(`filename: ${payload.filename || "unknown"}`);
        lines.push(`stored_file: ${payload.stored_file || "n/a"}`);
        lines.push(`chunk_count: ${payload.chunk_count}`);
        lines.push("");

        (payload.chunks || []).forEach((c) => {
          lines.push(`--- chunk ${c.chunk_index} ---`);
          lines.push(`embedding_dim: ${c.embedding_dim}`);
          lines.push(`embedding_preview: [${(c.embedding_preview || []).join(", ")}]`);
          lines.push(`text: ${c.chunk_text || ""}`);
          lines.push("");
        });

        summaryBox.textContent = lines.join("\n");
        statusEl.textContent = "Loaded note detail and embedding preview.";
      } catch (err) {
        errorEl.textContent = "Error: " + (err.message || String(err));
      }
    };

    window.resummarizeNote = async (encodedId) => {
      const noteId = decodeURIComponent(encodedId);
      errorEl.textContent = "";
      statusEl.textContent = "Re-summarizing stored note...";
      setSummaryText("");
      try {
        const response = await fetch(`/api/study-notes/${encodeURIComponent(noteId)}/resummarize-stream`, {
          method: "POST"
        });
        if (!response.ok) {
          const payload = await response.json();
          throw new Error(payload.detail || "Failed to re-summarize.");
        }
        await consumeSseResponse(response, (evt, payload) => {
          if (evt === "status") statusEl.textContent = payload.message || "";
          if (evt === "meta") {
            statusEl.textContent =
              "Working. note_id: " + payload.note_id +
              " | chunks: " + payload.chunks +
              " | source: " + payload.source;
          }
          if (evt === "token") setSummaryText(summaryTextBuffer + (payload.text || ""));
          if (evt === "done") statusEl.textContent = "Done.";
          if (evt === "error") throw new Error(payload.detail || "Stream failed.");
        });
      } catch (err) {
        errorEl.textContent = "Error: " + (err.message || String(err));
        setSummaryText("Re-summarize failed.");
      }
    };

    window.deleteNote = async (encodedId) => {
      const noteId = decodeURIComponent(encodedId);
      if (!confirm(`Delete note ${noteId}? This will remove Pinecone records and local file.`)) {
        return;
      }

      errorEl.textContent = "";
      statusEl.textContent = "Deleting note...";
      try {
        const response = await fetch(`/api/study-notes/${encodeURIComponent(noteId)}`, {
          method: "DELETE"
        });
        const payload = await response.json();
        if (!response.ok) throw new Error(payload.detail || "Failed to delete note.");

        statusEl.textContent =
          `Deleted ${payload.deleted_pinecone_records} vectors.`;
        summaryBox.textContent = `Deleted note_id: ${payload.note_id}\nLocal files deleted:\n` +
          (payload.deleted_local_files || []).join("\n");
        await refreshNotes();
      } catch (err) {
        errorEl.textContent = "Error: " + (err.message || String(err));
      }
    };

    refreshBtn.addEventListener("click", refreshNotes);

    submitBtn.addEventListener("click", async () => {
      errorEl.textContent = "";
      statusEl.textContent = "";

      const file = fileInput.files && fileInput.files[0];
      if (!file) {
        errorEl.textContent = "Please choose a .pdf or .txt file first.";
        return;
      }

      const formData = new FormData();
      formData.append("file", file);

      submitBtn.disabled = true;
      submitBtn.textContent = "Summarizing...";
      statusEl.textContent = "Uploading and generating summary. This may take a while.";
      setSummaryText("");

      try {
        const response = await fetch("/api/study-notes/summarize-stream", {
          method: "POST",
          body: formData
        });
        if (!response.ok) {
          const payload = await response.json();
          throw new Error(payload.detail || "Request failed.");
        }
        await consumeSseResponse(response, (evt, payload) => {
          if (evt === "status") statusEl.textContent = payload.message || "";
          if (evt === "meta") {
            statusEl.textContent =
              "Working. note_id: " + payload.note_id +
              " | chunks: " + payload.chunks +
              " | pinecone: " + payload.stored_to_pinecone;
          }
          if (evt === "token") setSummaryText(summaryTextBuffer + (payload.text || ""));
          if (evt === "done") statusEl.textContent = "Done.";
          if (evt === "error") throw new Error(payload.detail || "Stream failed.");
        });
        await refreshNotes();
      } catch (err) {
        errorEl.textContent = "Error: " + (err.message || String(err));
        setSummaryText("Summary failed.");
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Summarize";
      }
    });

    refreshNotes();
  </script>
</body>
</html>
